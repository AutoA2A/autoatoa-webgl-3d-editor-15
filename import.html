.nav .logo{font-weight:600;font-size:1.1rem;}

@media (max-width:600px){
    .nav-links{position:absolute;top:48px;left;0;right:0;background:var(--primary);flex-direction:none;display:none;}
    .nav-links.open{display:flex;flex-direction:column;align-items:stretch;}

<main>

<article class="card">
  <h3>导入模型</h3>
  <input type="file" id="modelFile" accept=".gltf,.glb,.obj" style="display:block;margin-bottom:var(--spacing);">
  <button class="btn" id="importBtn">导入</button>
  <p id="status" style="margin-top:var(--spacing);color:#555;"></p>
</article>

<script>
  const fileInput = document.getElementById('modelFile');
  const importBtn = document.getElementById('importBtn');
  const statusEl = document.getElementById('status');

  importBtn.addEventListener('click', async () => {
    const file = fileInput.files[0];
    if (!file) {
      statusEl.textContent = '请先选择一个模型文件';
      return;
    }
    statusEl.textContent = '正在读取文件...';
    importBtn.disabled = true;

    try {
      const arrayBuffer = await file.arrayBuffer();
      const blob = new Blob([arrayBuffer], { type: file.type });

      // 尝试直接调用打开的编辑器窗口（如果是通过 window.open 打开的）
      if (window.opener && typeof window.opener.loadModelFromBlob === 'function') {
        window.opener.loadModelFromBlob(blob);
        statusEl.textContent = '模型已发送到编辑器';
        // 可选：关闭此页
        setTimeout(() => window.close(), 1500);
        return;
      }

      // 否则存储到本地并跳转到编辑器页
      const url = URL.createObjectURL(blob);
      // 存储 URL 供 index.html 读取（使用 sessionStorage 以避免持久化大数据）
      sessionStorage.setItem('importedModelUrl', url);
      sessionStorage.setItem('importedModelType', file.type);
      // 跳转到主编辑器
      window.location.href = 'index.html';
    } catch (err) {
      console.error(err);
      statusEl.textContent = '读取失败：' + err.message;
    } finally {
      importBtn.disabled = false;
    }
  });

  // 如果页面是通过编辑器打开的（例如在弹窗中），提供一个取消按钮
  if (window.opener) {
    const cancelBtn = document.createElement('button');
    cancelBtn.textContent = '取消';
    cancelBtn.className = 'btn';
    cancelBtn.style.marginLeft = var(--spacing);
    cancelBtn.addEventListener('click', () => window.close());
    document.querySelector('.card').appendChild(cancelBtn);
  }
</script>

</main>
