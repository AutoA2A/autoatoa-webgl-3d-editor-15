<article class="card">
    <h3>编辑历史</h3>
    <div style="margin-bottom:var(--spacing);">
        <button class="btn" id="undoBtn">撤销 ⟲</button>
        <button class="btn" id="redoBtn">重做 ⟳</button>
        <button class="btn" id="saveVersionBtn">保存版本</button>
    </div>
    <ul id="historyList" class="card" style="list-style:none;padding:0;max-height:300px;overflow:auto;"></ul>
</article>

<script>
(() => {
    const STORAGE_KEY = 'editorHistory';
    const VERSION_KEY = 'editorVersions';

    // 简单的历史记录模型（每条记录为字符串描述）
    let history = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    let pointer = history.length; // 指向下一个可写位置

    const historyList = document.getElementById('historyList');
    const undoBtn = document.getElementById('undoBtn');
    const redoBtn = document.getElementById('redoBtn');
    const saveBtn = document.getElementById('saveVersionBtn');

    function render() {
        historyList.innerHTML = '';
        history.forEach((item, idx) => {
            const li = document.createElement('li');
            li.textContent = item;
            li.style.padding = '4px 8px';
            li.style.cursor = 'pointer';
            li.style.background = idx === pointer - 1 ? 'var(--secondary)' : 'transparent';
            li.style.color = idx === pointer - 1 ? '#fff' : 'inherit';
            li.onclick = () => {
                pointer = idx + 1;
                applyState();
                render();
            };
            historyList.appendChild(li);
        });
        undoBtn.disabled = pointer === 0;
        redoBtn.disabled = pointer >= history.length;
    }

    function pushAction(desc) {
        // 当在中间位置添加新记录，截断后面的历史
        if (pointer < history.length) {
            history = history.slice(0, pointer);
        }
        history.push(desc);
        pointer = history.length;
        saveHistory();
        render();
    }

    function applyState() {
        // 这里仅演示，实际项目应把状态恢复到编辑器
        console.log('应用状态至指针位置:', pointer);
    }

    function undo() {
        if (pointer > 0) {
            pointer--;
            applyState();
            render();
        }
    }

    function redo() {
        if (pointer < history.length) {
            pointer++;
            applyState();
            render();
        }
    }

    function saveVersion() {
        const versions = JSON.parse(localStorage.getItem(VERSION_KEY) || '[]');
        const snapshot = {
            timestamp: new Date().toISOString(),
            history: [...history],
            pointer
        };
        versions.push(snapshot);
        localStorage.setItem(VERSION_KEY, JSON.stringify(versions));
        alert('版本已保存 (' + snapshot.timestamp + ')');
    }

    // 绑定按钮
    undoBtn.onclick = undo;
    redoBtn.onclick = redo;
    saveBtn.onclick = saveVersion;

    // 示例：在页面加载时自动记录一次“打开编辑器”
    if (!history.length) {
        pushAction('打开编辑器');
    }

    render();
})();
</script>
